<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#g1)"/>
  <!-- Inner portal arc - top -->
  <path d="M 30 68 C 30 40 70 40 70 68" stroke="url(#g2)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Inner portal arc - smaller -->
  <path d="M 40 68 C 40 50 60 50 60 68" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- Base line -->
  <line x1="22" y1="68" x2="78" y2="68" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Top dot -->
  <circle cx="50" cy="30" r="5" fill="white"/>
</svg>